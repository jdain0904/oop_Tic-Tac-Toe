services:
  - type: web
    name: tictactoe-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4
    envVars:
      - key: TRAIN_EPISODES
        value: "100000"
    healthCheckPath: /api/train_status
